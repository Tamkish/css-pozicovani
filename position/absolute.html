            position: absolute;
            top: 40px;
            left: 60px;
            display:inline;
        }
    </style>

<body>
    <h1>Nádherná stránka</h1>
    <section>
        <div>position: absolute; top: 40px; left: 60px</div>
        <p>Podle všech známých zákonů létání, není možné, aby včely mohly létat. Jejich křídla jsou moc malá, aby zvedla těžké tělo ze země. Včely přesto samozřejmě létají. Protože včelám je jedno, co si lidé myslí, že je možné.</p>
