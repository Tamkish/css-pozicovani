<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline</title>


    <style>
        html{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        section{
            border: pink 2px dotted;
        }

        span{
            display:inline;

            height: 50px;
            background-color: orangered;
            color: yellow;
        }
       
    </style>
</head>
<body>
    <h1>display: inline</h1>
    <section>
        
        <p>Podle všech známých zákonů létání, není možné, aby včely mohly létat. Jejich křídla jsou moc malá, aby zvedla těžké tělo ze země. <span>Včely</span> přesto samozřejmě létají. Protože včelám je jedno, co si lidé myslí, že je možné.</p>
    </section><!--p>Nikdy se tě nevzdám<br>
Nikdy tě nezklamu<br>
Nebudu nikde pobíhat a neopustím tě<br>
Nedopustím aby ses rozbrečela<br>
Nikdy od tebe neodejdu<br>
Nikdy ti nebudu lhát, nikdy ti neublížím</p-->
</body>
</html>
