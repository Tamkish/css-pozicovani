<!DOCTYPE html>
<html>
    <head>
        <style>
        * {
        box-sizing: border-box;
        }

        .flex-container {
        display: flex;
        flex-wrap: wrap;
        font-size: 30px;
        text-align: center;
        }

        .flex-item-left {
        background-color: #f1f1f1;
        padding: 10px;
        flex: 50%;
        }

        .flex-item-right {
        background-color: dodgerblue;
        padding: 10px;
        flex: 50%;
        }

        /* Responsive layout - makes a one column-layout instead of a two-column layout */
        @media (max-width: 400px) {
        .flex-item-right, .flex-item-left {
            flex: 100%;
        }
        }
        </style>
        <title>flex</title>
    </head>
    <body>

        <h1>display: flex</h1>

        <p>In this example, we change the percentage of flex to create different layouts for different screen sizes.</p>
        <p><b>Resize the browser window to see that the direction changes when the 
        screen size is 400px or smaller.</b></p>

        <div class="flex-container">
        <div class="flex-item-left">1</div>
        <div class="flex-item-right">2</div>
        </div>
        <p>ukázka vypůjčena z w3schools</p><!-- https://www.w3schools.com/cssref/tryit.asp?filename=trycss3_flex_responsive -->
    </body>
</html>
